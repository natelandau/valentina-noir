---
name: "Reusable Tests"

on:
    workflow_call:
        inputs:
            run-coverage:
                description: "Run coverage"
                required: false
                type: boolean
                default: false

env:
    # CI-specific overrides (pytest-env in pyproject.toml provides base test config)
    VAPI_NAME: "ci-test"
    VAPI_DEBUG: false
    VAPI_AUTHENTICATION_ENCRYPTION_KEY: 95bfffc1521e76be955aa786f623f996c85f49e6a5788e126b85d1d630c30245 # gitleaks:allow
    VAPI_RATE_LIMIT__ENCRYPTION_KEY: 95bfffc1521e76be955aa786f623f996c85f49e6a5788e126b85d1d630c30245 # gitleaks:allow
    VAPI_REDIS__URL: "redis://localhost:6379/0"
    VAPI_SERVER__HOST: 0.0.0.0

jobs:
    test-python-code:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: true
            matrix:
                python-version: ["3.13"]
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Python, uv, and the package
              uses: ./.github/actions/setup_python_env
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Confirm we have docker available
              shell: bash
              run: docker info

            - name: Install postgresql-client-18 from PGDG
              shell: bash
              # Ubuntu runners ship postgresql-client-16, but the project targets
              # Postgres 18 (see Dockerfile). pg_dump refuses to dump a server
              # newer than itself, so the backup/restore tests need matching tools.
              run: |
                  sudo install -d /usr/share/postgresql-common/pgdg
                  sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
                      -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
                  codename="$(lsb_release -cs)"
                  echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${codename}-pgdg main" \
                      | sudo tee /etc/apt/sources.list.d/pgdg.list
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends postgresql-client-18
                  pg_dump --version

            - name: Run tests
              shell: bash
              run: |
                  uv run pytest tests/ src/ --config-file pyproject.toml --color=yes --cov --cov-config=pyproject.toml --cov-report=xml --cov-report=term -n auto

            - name: Upload coverage to Codecov
              if: ${{ inputs.run-coverage && matrix.python-version == '3.13' }}
              uses: codecov/codecov-action@v6
              with:
                  files: .cache/coverage.xml
              env:
                  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    lint-project:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - uses: actions/cache@v5
              with:
                  path: ~/.cache/prek
                  key: prek-${{ hashFiles('.pre-commit-config.yaml') }}

            - name: Setup Python, uv, and the package
              uses: ./.github/actions/setup_python_env

            - name: run all linters
              shell: bash
              run: uv run duty lint
