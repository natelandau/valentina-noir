---
services:
  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --save 20 1 --loglevel warning --requirepass redispassword
    volumes:
      - .dev/redis:/data
    attach: false # suppress logs to console

  mongodb:
    image: mongo:latest
    ports:
      - 27017:27017
    volumes:
      - .dev/mongodb:/data/db
    attach: false # suppress logs to console

  postgres:
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: valentina
      POSTGRES_PASSWORD: valentina
      POSTGRES_DB: valentina-noir
    volumes:
      - .dev/postgres:/var/lib/postgresql
    attach: false # suppress logs to console
